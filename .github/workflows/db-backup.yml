name: Daily Database Backup

on:
  schedule:
    - cron: '0 10 * * *' # 2 AM PST (UTC-8); fires at 3 AM in summer (PDT)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            --host=db.rfiukmdsbcofrepnbigi.supabase.co \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --no-password \
            --format=plain \
            > backup-$(date +%Y-%m-%d).sql

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: backup-*.sql
          retention-days: 7
